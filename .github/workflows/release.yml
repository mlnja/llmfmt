name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            binary: llmfmt
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            binary: llmfmt
          - os: macos-latest
            suffix: darwin-arm64
            binary: llmfmt
          - os: macos-15-intel
            suffix: darwin-amd64
            binary: llmfmt
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --bin ${{ matrix.binary }}

      - name: Strip and package
        shell: bash
        run: |
          if command -v strip >/dev/null 2>&1; then
            strip target/release/${{ matrix.binary }} || true
          fi

          mkdir -p dist
          cp target/release/${{ matrix.binary }} dist/llmfmt-${{ matrix.suffix }}
          cd dist
          tar czf llmfmt-${{ matrix.suffix }}.tar.gz llmfmt-${{ matrix.suffix }}
          shasum -a 256 llmfmt-${{ matrix.suffix }}.tar.gz > llmfmt-${{ matrix.suffix }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: llmfmt-${{ matrix.suffix }}
          path: dist/

  build-deb:
    name: Build Debian Packages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/version = \"\\(.*\\)\"/\\1/')" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          name: llmfmt-linux-amd64
          path: dist-amd64

      - uses: actions/download-artifact@v4
        with:
          name: llmfmt-linux-arm64
          path: dist-arm64

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build Debian packages
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          for PAIR in "amd64:amd64" "arm64:arm64"; do
            ARCH="${PAIR%%:*}"
            SUFFIX="${PAIR##*:}"
            PKG="llmfmt_${VERSION}_${ARCH}"

            mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/bin" "${PKG}/usr/share/doc/llmfmt"
            cp "dist-${SUFFIX}/llmfmt-linux-${SUFFIX}" "${PKG}/usr/bin/llmfmt"
            chmod 755 "${PKG}/usr/bin/llmfmt"
            [ -f README.md ] && cp README.md "${PKG}/usr/share/doc/llmfmt/"

            cat > "${PKG}/DEBIAN/control" <<EOF
          Package: llmfmt
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: mlnja <opensource@mlnja.com>
          Description: Deterministic CLI for compact prompt-ready structured data
           llmfmt converts JSON, YAML, TOML, CSV, and TOON into compact text
           representations such as TOON, TSV, YAML, and compact JSON.
          Homepage: https://github.com/mlnja/llmfmt
          EOF

            dpkg-deb --build "${PKG}"
          done

          sha256sum llmfmt_*.deb > debian-checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: |
            llmfmt_*.deb
            debian-checksums.txt

  create-release:
    name: Create Release
    needs: [build, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" -o -name "*.deb" -o -name "debian-checksums.txt" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
